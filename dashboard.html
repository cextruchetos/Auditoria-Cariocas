<!DOCTYPE html>
<html lang="es">
<body>
  <h1>📊 Reportes</h1>
  <div id="grid">Cargando...</div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyAtZ3vacprvRXd7v-KDO-DMfmgT53I_U-I",
      authDomain: "auditoria-cariocas.firebaseapp.com",
      projectId: "auditoria-cariocas",
      storageBucket: "auditoria-cariocas.firebasestorage.app",
      messagingSenderId: "191331540307",
      appId: "1:191331540307:web:bc3d9c93c832c6c9ce15a6"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    async function load() {
      const snapshot = await getDocs(query(collection(db, 'hallazgos'), orderBy('timestamp', 'desc')));
      document.getElementById('grid').innerHTML = '';
      snapshot.forEach(doc => {
        const d = doc.data();
        document.getElementById('grid').innerHTML += `<div><h3>${d.areaName}</h3><p>${d.descripcion}</p></div>`;
      });
    }
    load();
  </script>
</body>
</html>
