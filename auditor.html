<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Hallazgo</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f3f4f6; }
    .card { background: white; padding: 20px; border-radius: 12px; max-width: 500px; margin: auto; }
    button { width: 100%; padding: 15px; margin-top: 10px; background: #1B4FD8; color: white; border: none; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Registrar Hallazgo</h2>
    <select id="grupo" style="width:100%; padding:10px; margin:10px 0;">
      <option value="Grupo 1">Grupo 1</option>
      <option value="Grupo 2">Grupo 2</option>
      <option value="Grupo 3">Grupo 3</option>
      <option value="Grupo 4">Grupo 4</option>
      <option value="Grupo 5">Grupo 5</option>
    </select>
    <textarea id="desc" placeholder="Descripción del hallazgo..." style="width:100%; height:100px;"></textarea>
    <button onclick="registrar()">Guardar en la nube</button>
    <a href="index.html" style="display:block; text-align:center; margin-top:15px;">Volver al inicio</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAtZ3vacprvRXd7v-KDO-DMfmgT53I_U-I",
      authDomain: "auditoria-cariocas.firebaseapp.com",
      projectId: "auditoria-cariocas",
      storageBucket: "auditoria-cariocas.firebasestorage.app",
      messagingSenderId: "191331540307",
      appId: "1:191331540307:web:bc3d9c93c832c6c9ce15a6"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    window.registrar = async () => {
      await addDoc(collection(db, 'hallazgos'), {
        areaName: document.getElementById('grupo').value,
        descripcion: document.getElementById('desc').value,
        timestamp: Date.now()
      });
      alert('Registrado correctamente');
    };
  </script>
</body>
</html>
