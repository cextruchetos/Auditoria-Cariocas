<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Auditoría — Registro</title>
<style>
  :root{--bg:#F7F8FA;--surface:#FFFFFF;--border:#E2E6EC;--text:#1A1D23;--accent:#1B4FD8;}
  body{font-family:sans-serif;background:var(--bg);padding:20px;}
  .card{background:white; padding:20px; border-radius:12px; max-width:500px; margin:auto;}
  .area-btn{display:flex;align-items:center;width:100%;padding:15px;margin-bottom:10px;background:white;border:1px solid var(--border);border-radius:8px;cursor:pointer;}
  .submit-btn{width:100%;padding:15px;background:var(--accent);color:white;border:none;border-radius:8px;cursor:pointer;margin-top:10px;}
</style>
</head>
<body>
<div class="card" id="areaSelectorWrap">
  <h3>Selecciona el Grupo</h3>
  <button class="area-btn" onclick="selectArea('1','Grupo 1')">1️⃣ Grupo 1</button>
  <button class="area-btn" onclick="selectArea('2','Grupo 2')">2️⃣ Grupo 2</button>
  <button class="area-btn" onclick="selectArea('3','Grupo 3')">3️⃣ Grupo 3</button>
  <button class="area-btn" onclick="selectArea('4','Grupo 4')">4️⃣ Grupo 4</button>
  <button class="area-btn" onclick="selectArea('5','Grupo 5')">5️⃣ Grupo 5</button>
</div>

<div class="card" id="mainForm" style="display:none;">
  <h3>Registrar Hallazgo</h3>
  <textarea id="descripcion" style="width:100%;height:100px;"></textarea>
  <button class="submit-btn" onclick="submitHallazgo()">Guardar en la nube</button>
  <a href="index.html" style="display:block;text-align:center;margin-top:10px;">Volver</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtZ3vacprvRXd7v-KDO-DMfmgT53I_U-I",
  authDomain: "auditoria-cariocas.firebaseapp.com",
  projectId: "auditoria-cariocas",
  storageBucket: "auditoria-cariocas.firebasestorage.app",
  messagingSenderId: "191331540307",
  appId: "1:191331540307:web:bc3d9c93c832c6c9ce15a6"
};

const db = getFirestore(initializeApp(firebaseConfig));
let currentAreaName = null;

window.selectArea = (code, name) => {
  currentAreaName = name;
  document.getElementById('areaSelectorWrap').style.display = 'none';
  document.getElementById('mainForm').style.display = 'block';
};

window.submitHallazgo = async () => {
  await addDoc(collection(db, 'hallazgos'), {
    areaName: currentAreaName,
    descripcion: document.getElementById('descripcion').value,
    timestamp: Date.now()
  });
  alert('Registrado');
  location.reload();
};
</script>
</body>
</html>
